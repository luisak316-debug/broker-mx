# API permanente en Render.com — SMS 24/7 sin tu PC encendida
# Planes de pago: API siempre encendida (sin cold start ~1 min del plan free)
# 1) Sube el repo a GitHub
# 2) dashboard.render.com → New → Blueprint → conecta broker-mx
# 3) Tarjeta en Render (Billing) + variables Twilio (desde backend/.env)
# 4) Ejecuta CONFIGURAR_API_VERCEL.bat con la URL de Render

services:
  - type: web
    name: broker-mx-api
    runtime: node
    plan: starter
    buildCommand: NPM_CONFIG_PRODUCTION=false npm install && npm --workspace backend run prisma:generate && npm --workspace backend run prisma:push && npm --workspace backend run build
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SKIP_DB_PUSH
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: broker-mx-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: BASE_CURRENCY
        value: MXN
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false

databases:
  - name: broker-mx-db
    plan: basic-256mb
    databaseName: brokermx
    user: brokermx
