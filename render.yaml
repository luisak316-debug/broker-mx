# API permanente en Render.com — SMS 24/7 sin tu PC encendida
# 1) Sube el repo a GitHub
# 2) dashboard.render.com → New → Blueprint → conecta broker-mx
# 3) Pega las variables Twilio (desde backend/.env)
# 4) Ejecuta CONFIGURAR_API_VERCEL.bat con la URL de Render

services:
  - type: web
    name: broker-mx-api
    runtime: node
    plan: free
    buildCommand: npm install && npm --workspace backend run build
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: BASE_CURRENCY
        value: MXN
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
