# API permanente en Render.com — SMS 24/7 sin tu PC encendida
# Plan producción (~$44 USD/mes · ~$768 MXN/mes): Standard API + PostgreSQL 1 GB
# 1) Sube el repo a GitHub
# 2) dashboard.render.com → Billing (tarjeta) + confirma planes Standard / Basic 1 GB
# 3) Variables Twilio (desde backend/.env)
# 4) Ejecuta CONFIGURAR_API_VERCEL.bat con la URL de Render

services:
  - type: web
    name: broker-mx-api
    runtime: node
    plan: standard
    buildCommand: NPM_CONFIG_PRODUCTION=false npm install && npm --workspace backend run prisma:generate && npm --workspace backend run prisma:push && npm --workspace backend run build
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SKIP_DB_PUSH
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: broker-mx-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: BASE_CURRENCY
        value: MXN
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false

databases:
  - name: broker-mx-db
    plan: basic-1gb
    databaseName: brokermx
    user: brokermx
